<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="accent-glow" cx="80%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <rect width="1200" height="630" fill="url(#accent-glow)"/>

  <!-- Divider line -->
  <line x1="100" y1="390" x2="1100" y2="390" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Band name -->
  <text x="600" y="260" font-family="system-ui, sans-serif" font-size="120" font-weight="900" fill="#ededed" text-anchor="middle" letter-spacing="-2">AUCTION</text>

  <!-- Single title -->
  <text x="600" y="350" font-family="system-ui, sans-serif" font-size="42" font-weight="300" fill="rgba(237,237,237,0.7)" text-anchor="middle" letter-spacing="6">A CENTURY</text>

  <!-- Label -->
  <text x="600" y="440" font-family="system-ui, sans-serif" font-size="16" font-weight="400" fill="#8b5cf6" text-anchor="middle" letter-spacing="8">THE NEW SINGLE — OUT NOW</text>
</svg>
